name: Deploy argus.com.ai (home)

# Stands up argus.com.ai as the PRIMARY home, with joeycastillo.us/argus as the mirror.
# Deploys ONLY the home (index.html + jc.png) to a dedicated `argus` Cloudflare Pages project,
# then attaches argus.com.ai + www.argus.com.ai as custom domains via the CF API. The zone is
# already on Cloudflare (kenia/carter.ns), so Pages auto-provisions the DNS records + cert.
# Uses this repo's valid CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID secrets.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'argus/index.html'
      - 'argus/jc.png'
      - '.github/workflows/deploy-argus.yml'

jobs:
  deploy-argus-home:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PROJECT: argus
    steps:
      - uses: actions/checkout@v4

      - name: Stage home-only deploy dir (no console)
        run: |
          mkdir -p _argus_home
          cp argus/index.html _argus_home/index.html
          cp argus/jc.png      _argus_home/jc.png
          ls -la _argus_home

      - name: Ensure the Pages project exists
        run: npx --yes wrangler@4.75.0 pages project create "$PROJECT" --production-branch=main || true

      - name: Deploy the home to the argus project
        run: npx --yes wrangler@4.75.0 pages deploy _argus_home --project-name="$PROJECT" --branch=main --commit-dirty=true

      - name: Attach custom domains (argus.com.ai + www)
        run: |
          for d in argus.com.ai www.argus.com.ai; do
            echo "== attaching $d =="
            resp=$(curl -sS -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${PROJECT}/domains" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "{\"name\":\"$d\"}")
            echo "$resp"
            if echo "$resp" | grep -q '"success":true'; then
              echo "  OK: $d attached"
            elif echo "$resp" | grep -qi 'already\|exist'; then
              echo "  already attached: $d (idempotent)"
            else
              echo "  NOTE: $d attach returned a non-success body (see above)"
            fi
          done

      - name: Verify the edge serves the home
        run: |
          echo "waiting for propagation..."
          for i in $(seq 1 18); do
            code=$(curl -sS -m 20 -o /tmp/h.html -w "%{http_code}" https://argus.com.ai/ || echo 000)
            hit=$(grep -c "Watch the systems you run" /tmp/h.html 2>/dev/null || echo 0)
            echo "try $i: argus.com.ai -> HTTP $code | home-content=$hit"
            if [ "$code" = "200" ] && [ "$hit" -ge 1 ]; then echo "LIVE + VERIFIED"; exit 0; fi
            sleep 10
          done
          echo "NOTE: deploy + domain attach succeeded; first-time cert/DNS can take a few minutes."
