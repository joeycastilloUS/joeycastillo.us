<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joey Castillo</title>
    <link rel="icon" type="image/svg+xml" href="/favicon-jc.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            padding: 0.75rem 1rem;
            background: #0a0a0a;
            border-bottom: 1px solid #1a1a1a;
            z-index: 10;
            flex-wrap: wrap;
        }
        .nav a {
            color: #666;
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
        }
        .nav a:hover {
            color: #4ec9b0;
        }
        .container {
            max-width: 640px;
            width: 100%;
            margin-top: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 2rem;
            color: #ffffff;
        }
        a {
            color: #888;
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.2s;
        }
        a:hover {
            color: #fff;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .links .desc {
            color: #555;
            font-size: 0.85rem;
            margin-left: 0.25rem;
        }
        .links .sub {
            margin-left: 1.5rem;
        }
        .links .sub a {
            color: #444;
            font-size: 0.85rem;
        }
        .links .sub a:hover {
            color: #888;
        }
        .links .sub .desc {
            color: #3a3a3a;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="https://joeycastillo.us">joeycastillo.us</a>
        <a href="https://ai-pantheon.ai">ai-pantheon.ai</a>
        <a href="https://kastil-systems.com">kastil-systems.com</a>
        <a href="https://acmedev.com">acmedev.com</a>
        <a href="/meet">meet now</a>
    </nav>

    <div class="container">
        <h1>Joey Castillo</h1>
        <div class="links">
            <div><a href="https://wateroflife.supply">water</a> <span class="desc">— the water of life formula, given away free</span></div>
            <div class="sub"><a href="/dev">- softdev artifacts</a></div>
            <div><a href="/metal">metal</a> <span class="desc">— bare metal provisioning and workflow. one signal in, full chain reaction out.</span></div>
        </div>
    </div>
</body>
</html>
