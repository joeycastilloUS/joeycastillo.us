<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joey Castillo</title>
    <link rel="icon" type="image/svg+xml" href="/favicon-jc.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            padding: 0.75rem 1rem;
            background: #0a0a0a;
            border-bottom: 1px solid #1a1a1a;
            z-index: 10;
            flex-wrap: wrap;
        }
        .nav a {
            color: #666;
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
        }
        .nav a:hover {
            color: #4ec9b0;
        }
        .container {
            max-width: 640px;
            width: 100%;
            margin-top: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 2rem;
            color: #ffffff;
        }
        a {
            color: #888;
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.2s;
        }
        a:hover {
            color: #fff;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .links .desc {
            color: #555;
            font-size: 0.85rem;
            margin-left: 0.25rem;
        }
        .links .sub {
            margin-left: 1.5rem;
        }
        .links .sub a {
            color: #444;
            font-size: 0.85rem;
        }
        .links .sub a:hover {
            color: #888;
        }
        .links .sub .desc {
            color: #3a3a3a;
            font-size: 0.8rem;
        }
        .away {
            margin-top: 2.5rem;
            font-size: 0.65rem;
            color: #2a2a2a;
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }
        .away-dot {
            position: relative;
            cursor: default;
        }
        .away-dot::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #222;
            margin-right: 0.2rem;
            vertical-align: middle;
        }
        .away-dot .tip {
            visibility: hidden;
            opacity: 0;
            position: absolute;
            bottom: 1.4rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            border: 1px solid #333;
            color: #888;
            font-size: 0.65rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            white-space: nowrap;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .away-dot:hover .tip {
            visibility: visible;
            opacity: 1;
        }
        .away-dot:hover::before {
            background: #4ec9b0;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="https://joeycastillo.us">joeycastillo.us</a>
        <a href="https://ai-pantheon.ai">ai-pantheon.ai</a>
        <a href="https://kastil-systems.com">kastil-systems.com</a>
        <a href="https://acmedev.com">acmedev.com</a>
        <a href="/meet">meet now</a>
    </nav>

    <div class="container">
        <h1>Joey Castillo</h1>
        <div class="links">
            <div><a href="https://wateroflife.supply">water</a> <span class="desc">— the water of life formula, given away free</span></div>
            <div class="sub"><a href="/dev">- softdev artifacts</a></div>
            <div><a href="/metal">metal</a> <span class="desc">— bare metal provisioning and workflow. one signal in, full chain reaction out.</span></div>
        </div>

        <div class="away">
            <span class="away-dot">29<span class="tip">Cavite</span></span>
            <span class="away-dot">30<span class="tip">Boracay</span></span>
            <span class="away-dot">31<span class="tip">Boracay</span></span>
            <span class="away-dot">1<span class="tip">Boracay</span></span>
            <span class="away-dot">2<span class="tip">Manila</span></span>
            <span class="away-dot">3<span class="tip">Manila</span></span>
        </div>
    </div>
</body>
</html>
