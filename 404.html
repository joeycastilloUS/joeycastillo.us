<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — not found</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/favicon-jc.svg">
<style>
  :root{ --bg:#0A0A0A; --accent:#6FC3DF; --text:#E0E0E0; --text2:#888; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    background:var(--bg); color:var(--text);
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    display:flex; align-items:center; justify-content:center;
    text-align:center; padding:2rem;
  }
  .code{ font-size:5rem; font-weight:700; color:var(--accent); letter-spacing:-2px; }
  h1{ font-size:1.25rem; font-weight:500; margin:0.5rem 0 1rem; }
  p{ color:var(--text2); margin-bottom:1.75rem; line-height:1.6; }
  a{ color:var(--accent); text-decoration:none; border:1px solid var(--accent);
     padding:0.6rem 1.25rem; border-radius:4px; display:inline-block; transition:all .15s; }
  a:hover{ background:var(--accent); color:var(--bg); }
</style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>Nothing here.</h1>
    <p>This page doesn&rsquo;t exist, or it was taken down.</p>
    <a href="/">&larr; joeycastillo.us</a>
  </div>
</body>
</html>
