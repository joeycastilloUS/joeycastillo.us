<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>metal · tilde</title>
<link rel="icon" type="image/svg+xml" href="/metal/favicon-m.svg">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0a; color:#ddd; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; line-height:1.6; }
  a { color:#4ec9b0; }
  .nav { padding:14px 24px; border-bottom:1px solid #1c1c1c; font-size:.8rem; }
  .nav a { color:#666; text-decoration:none; margin-right:16px; } .nav a:hover { color:#4ec9b0; }
  .wrap { max-width:820px; margin:0 auto; padding:34px 22px 80px; }
  .cmd { color:#4ec9b0; font-family:Consolas,monospace; font-size:2.4rem; font-weight:700; letter-spacing:1px; }
  .name { color:#fff; font-size:1.5rem; margin:2px 0 6px; }
  .cat { display:inline-block; font-size:.7rem; text-transform:uppercase; letter-spacing:.12em; color:#4ec9b0; border:1px solid #2c4a44; border-radius:10px; padding:2px 10px; vertical-align:middle; margin-left:10px; }
  .oneliner { color:#bbb; font-size:1.05rem; margin:10px 0 22px; border-left:3px solid #4ec9b0; padding-left:14px; }
  .meta { display:flex; flex-wrap:wrap; gap:10px 26px; margin:18px 0 26px; font-size:.82rem; color:#888; border-top:1px solid #1c1c1c; border-bottom:1px solid #1c1c1c; padding:14px 0; }
  .meta b { color:#aaa; font-weight:600; } .meta code { color:#bfe9f7; }
  .aliases code { background:#141414; border:1px solid #262626; border-radius:4px; padding:1px 7px; margin-right:5px; font-family:Consolas,monospace; font-size:.8rem; color:#4ec9b0; }
  h2 { color:#4ec9b0; font-size:.95rem; text-transform:uppercase; letter-spacing:.1em; margin:28px 0 8px; }
  .card { background:#121212; border:1px solid #1e1e1e; border-radius:8px; padding:16px 18px; }
  .ai { border-left:3px solid #4ec9b0; }
  .ai .lbl { color:#4ec9b0; font-size:.72rem; text-transform:uppercase; letter-spacing:.12em; margin-bottom:6px; }
  code.src { background:#141414; border:1px solid #262626; border-radius:4px; padding:2px 8px; font-family:Consolas,monospace; font-size:.8rem; color:#bfe9f7; }
  .approx { color:#7a6a3a; font-size:.72rem; }
  .err { color:#ff8b8b; }
  .foot { color:#555; font-size:.75rem; margin-top:40px; border-top:1px solid #1c1c1c; padding-top:14px; }
</style>
</head>
<body>
<div class="nav">
  <a href="/metal">&larr; metal</a>
  <a href="/metal/reference.html">reference</a>
  <a href="/metal/patterns/">patterns</a>
</div>
<div class="wrap" id="wrap">
  <p style="color:#666">Loading…</p>
</div>
<script>
function qs(k){ return new URLSearchParams(location.search).get(k); }
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function dt(t){ if(!t) return '<span class="approx">unknown</span>'; return esc(t); }

fetch('/metal/tildes.json').then(r=>r.json()).then(data=>{
  var want = (qs('t')||'').toLowerCase();
  var t = data.tildes.find(function(x){
    if(x.cmd.toLowerCase()===want) return true;
    return (x.aliases||[]).some(function(a){ return a.toLowerCase()===want || a.replace(/^~/,'').toLowerCase()===want; });
  });
  var w = document.getElementById('wrap');
  if(!t){
    w.innerHTML = '<p class="err">No tilde matches <code>'+esc(want)+'</code>.</p>'+
      '<p style="margin-top:12px"><a href="/metal">&larr; back to the command grid</a></p>';
    document.title = 'metal · tilde not found';
    return;
  }
  document.title = 'metal · '+t.cmd+' — '+t.name;
  var approx = t.datesApprox ? ' <span class="approx">(approx — file-level)</span>' : '';
  var aliases = (t.aliases||[]).map(function(a){return '<code>'+esc(a)+'</code>';}).join(' ');
  w.innerHTML =
    '<div class="cmd">'+esc(t.cmd)+'<span class="cat">'+esc(t.cat)+'</span></div>'+
    '<div class="name">'+esc(t.name)+'</div>'+
    '<div class="oneliner">'+esc(t.oneLiner)+'</div>'+
    '<div class="meta">'+
      '<span><b>Created</b> '+dt(t.created)+approx+'</span>'+
      '<span><b>Last updated</b> '+dt(t.updated)+approx+'</span>'+
      '<span class="aliases"><b>Aliases</b> '+aliases+'</span>'+
    '</div>'+
    '<h2>What it does</h2>'+
    '<div class="card">'+esc(t.spec)+'</div>'+
    '<h2>What Claude Code does</h2>'+
    '<div class="card ai"><div class="lbl">'+esc(data.model||'Claude Code')+' &mdash; when you run '+esc(t.cmd)+'</div>'+esc(t.aiDoes)+'</div>'+
    '<h2>Source of truth</h2>'+
    '<div class="card"><code class="src">'+esc(t.source)+'</code><div style="color:#777;font-size:.78rem;margin-top:8px">Mirrored from the metal kernel on '+esc(data.mirroredOn)+'. This page renders <code>/metal/tildes.json</code> directly, so it stays in sync with reality.</div></div>'+
    '<div class="foot">metal console &middot; tilde reference &middot; '+esc(data.model||'')+'</div>';
}).catch(function(e){
  document.getElementById('wrap').innerHTML = '<p class="err">Could not load tildes.json: '+esc(String(e))+'</p>';
});
</script>
</body>
</html>
