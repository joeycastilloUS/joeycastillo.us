<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>metal — Joey Castillo</title>
    <link rel="icon" type="image/svg+xml" href="/metal/favicon-m.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 640px;
            width: 100%;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 0.25rem;
            color: #ffffff;
        }
        .dedication {
            font-style: italic;
            color: #888;
            margin-bottom: 2.5rem;
            font-size: 0.9rem;
        }
        .dedication a {
            color: #888;
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .dedication a:hover {
            color: #bbb;
        }
        .step {
            color: #888;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
        }
        .step strong {
            color: #ccc;
        }
        .command-box {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 1.25rem 1.5rem;
            margin: 1.5rem 0;
            position: relative;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .command-box:hover {
            border-color: #555;
        }
        .command-box code {
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 0.85rem;
            color: #4ec9b0;
            word-break: break-all;
        }
        .copy-btn {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            background: #333;
            border: none;
            color: #aaa;
            padding: 0.35rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .copy-btn:hover {
            background: #444;
            color: #fff;
        }
        .copy-btn.copied {
            background: #2d5a3d;
            color: #4ec9b0;
        }
        .footer {
            margin-top: 2.5rem;
            color: #555;
            font-size: 0.8rem;
        }
        .footer a {
            color: #666;
            text-decoration: none;
        }
        .footer a:hover {
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>metal</h1>
        <div class="dedication">Dedicated to <a href="https://en.wikipedia.org/wiki/Miraculous_Medal">Our Lady of the Miraculous Medal</a></div>

        <div class="step"><strong>1.</strong> Open PowerShell as Administrator</div>
        <div class="step"><strong>2.</strong> Paste this:</div>

        <div class="command-box" onclick="copyCommand()" id="cmdBox">
            <code id="cmd">irm https://joeycastillo.us/metal/boot.ps1 | iex</code>
            <button class="copy-btn" id="copyBtn">copy</button>
        </div>

        <div class="step"><strong>3.</strong> Autopilot takes it from here.</div>

        <div class="footer">
            <a href="https://joeycastillo.us">joeycastillo.us</a>
        </div>
    </div>

    <script>
        function copyCommand() {
            const cmd = document.getElementById('cmd').textContent;
            navigator.clipboard.writeText(cmd).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.textContent = 'copied';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'copy';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }
    </script>
</body>
</html>
