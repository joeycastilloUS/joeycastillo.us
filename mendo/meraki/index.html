<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Meraki Switch View &middot; Mendocino</title>
<style>
  :root{--bg:#0a0a0a;--surface:#141414;--line:#262626;--accent:#6FC3DF;--text:#e8e8e8;--dim:#888;--ok:#7CFFB2;--pos:#ffce85;}
  *{box-sizing:border-box;} body{margin:0;background:var(--bg);color:var(--text);line-height:1.5;font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;}
  .nav{background:#000;border-bottom:2px solid var(--accent);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;letter-spacing:.5px;}
  .nav .be{color:var(--accent);font-weight:800;} .nav .r{color:var(--dim);font-size:.78rem;}
  .wrap{max-width:1000px;margin:0 auto;padding:24px 20px 60px;}
  h1{font-size:1.4rem;font-weight:300;margin:0 0 14px;}
  .bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px;}
  select,button,input{background:var(--surface);color:var(--text);border:1px solid var(--line);border-radius:7px;padding:9px 12px;font-size:.9rem;font-family:inherit;}
  select{min-width:280px;} button{background:var(--accent);color:#000;font-weight:700;cursor:pointer;border:none;}
  .muted{color:var(--dim);font-size:.85rem;}
  h2{font-size:1rem;color:var(--accent);margin:24px 0 8px;}
  table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);border-radius:10px;overflow:hidden;font-size:.88rem;}
  th{text-align:left;color:var(--dim);font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;padding:9px 12px;border-bottom:1px solid var(--line);}
  td{padding:9px 12px;border-bottom:1px solid #1f1f1f;} tr:last-child td{border-bottom:none;}
  td.port{color:var(--accent);font-weight:700;} .vlan{font-weight:600;} .vlan.v90{color:var(--ok);} .vlan.v100{color:var(--pos);}
  .ip{font-family:ui-monospace,Consolas,monospace;color:#bbb;} .av{color:var(--dim);font-size:.82rem;}
  .err{color:#ff8b8b;margin-top:10px;}
  /* gate */
  .gate{position:fixed;inset:0;z-index:999;background:#0a0a0a;display:flex;align-items:center;justify-content:center;}
  .gate.hide{display:none;} .gbox{text-align:center;max-width:340px;width:90%;}
  .gbrand{font-size:2rem;font-weight:800;color:var(--accent);letter-spacing:.12em;} .gsub{color:#555;font-size:.8rem;margin:.3rem 0 1.6rem;}
  .gerr{color:#ff8b8b;font-size:.82rem;min-height:1.2em;margin-top:.6rem;}
</style>
</head>
<body>
<div class="gate" id="gate">
  <div class="gbox">
    <div class="gbrand">MERAKI</div>
    <div class="gsub">network switch view &middot; private</div>
    <form id="gform" autocomplete="off">
      <input id="gpw" type="password" placeholder="password" autofocus style="width:100%;">
      <button type="submit" style="width:100%;margin-top:.7rem;">Enter</button>
      <div class="gerr" id="gerr"></div>
    </form>
  </div>
</div>

<div class="nav"><span><span class="be">Be</span> &middot; Meraki Switch View</span><span class="r">Mendocino &middot; on demand</span></div>
<div class="wrap">
  <h1>POS / BOH Switch View</h1>
  <div class="bar">
    <select id="net"><option value="">Loading networks&hellip;</option></select>
    <button id="go">Pull</button>
    <span class="muted" id="status"></span>
  </div>
  <div id="out"></div>
  <div class="err" id="err"></div>
</div>

<script>
const BRIDGE = "https://meraki-bridge-d5vc4tye3a-uw.a.run.app";
const PW_KEY = "meraki_pw_v1";
let PW = sessionStorage.getItem(PW_KEY) || "";

function api(path){
  return fetch(BRIDGE + path, { headers: { "Authorization": "Bearer " + PW } });
}

async function loadNetworks(){
  const r = await api("/meraki/networks");
  if(r.status === 401){ throw new Error("unauthorized"); }
  const d = await r.json();
  const sel = document.getElementById("net");
  sel.innerHTML = "";
  d.networks.sort((a,b)=>a.name.localeCompare(b.name)).forEach(n=>{
    const o=document.createElement("option"); o.value=n.id; o.textContent=n.name; sel.appendChild(o);
  });
}

function vlanClass(v){ return v==90?"vlan v90":(v==100?"vlan v100":"vlan"); }

async function pull(){
  const net = document.getElementById("net").value;
  const out = document.getElementById("out"), err = document.getElementById("err");
  out.innerHTML=""; err.textContent="";
  document.getElementById("status").textContent = "pulling…";
  const r = await api("/meraki/portmap?network=" + encodeURIComponent(net));
  document.getElementById("status").textContent = "";
  if(!r.ok){ err.textContent = "error " + r.status; return; }
  const d = await r.json();
  if(!d.switches.length){ out.innerHTML = "<p class='muted'>No switches found on this network.</p>"; return; }
  d.switches.forEach(sw=>{
    const rows = [];
    sw.ports.forEach(p=>{
      const cs = (p.clients||[]).filter(c => c.Ip || c.ip);
      if((p.status||"").toLowerCase()!=="connected" || !cs.length) return; // connected + has a device only
      cs.forEach(c=>{
        rows.push({port:parseInt(p.port,10), device:(c.device||"?"), ip:(c.Ip||c.ip||""), vlan:p.vlan, av:p.allowedVlans});
      });
    });
    rows.sort((a,b)=>a.port-b.port);
    let html = "<h2>Switch: "+esc(sw.name||sw.Serial)+"</h2>";
    if(!rows.length){ html += "<p class='muted'>No connected devices.</p>"; out.insertAdjacentHTML("beforeend", html); return; }
    html += "<table><thead><tr><th>Port</th><th>Device</th><th>IP</th><th>VLAN</th><th>Allowed VLANs</th></tr></thead><tbody>";
    rows.forEach(x=>{
      html += "<tr><td class='port'>"+x.port+"</td><td>"+esc(x.device)+"</td><td class='ip'>"+esc(x.ip)+
        "</td><td class='"+vlanClass(x.vlan)+"'>"+(x.vlan??"")+"</td><td class='av'>"+(x.av?esc(x.av):"")+"</td></tr>";
    });
    html += "</tbody></table>";
    out.insertAdjacentHTML("beforeend", html);
  });
}
function esc(s){return String(s).replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]));}

document.getElementById("gform").addEventListener("submit", async e=>{
  e.preventDefault();
  PW = document.getElementById("gpw").value;
  try{
    await loadNetworks();
    sessionStorage.setItem(PW_KEY, PW);
    document.getElementById("gate").classList.add("hide");
  }catch(_){ document.getElementById("gerr").textContent = "wrong password"; PW=""; }
});
document.getElementById("go").addEventListener("click", pull);

// already authed this session?
(async()=>{ if(PW){ try{ await loadNetworks(); document.getElementById("gate").classList.add("hide"); }catch(_){ sessionStorage.removeItem(PW_KEY); } } })();
</script>
</body>
</html>
