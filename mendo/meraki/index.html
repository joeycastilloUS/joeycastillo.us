<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Meraki Switch View</title>
<style>
  :root{--bg:#0a0a0a;--surface:#141414;--line:#262626;--accent:#6FC3DF;--text:#e8e8e8;--dim:#888;--ok:#7CFFB2;--off:#777;}
  *{box-sizing:border-box;} body{margin:0;background:var(--bg);color:var(--text);line-height:1.5;font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;}
  .nav{background:#000;border-bottom:2px solid var(--accent);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;letter-spacing:.5px;}
  .nav .be{color:var(--accent);font-weight:800;} .nav .r{color:var(--dim);font-size:.78rem;}
  .wrap{max-width:1040px;margin:0 auto;padding:22px 20px 60px;}
  h1{font-size:1.35rem;font-weight:300;margin:0 0 14px;}
  .bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
  select,button,input{background:var(--surface);color:var(--text);border:1px solid var(--line);border-radius:7px;padding:9px 12px;font-size:.9rem;font-family:inherit;}
  select{min-width:280px;} button{background:var(--accent);color:#000;font-weight:700;cursor:pointer;border:none;}
  .combo{position:relative;min-width:320px;} #netsearch{width:100%;}
  .netlist{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:60;background:var(--surface);border:1px solid var(--line);border-radius:8px;max-height:300px;overflow:auto;display:none;box-shadow:0 10px 28px rgba(0,0,0,.55);}
  .netlist.open{display:block;}
  .netopt{padding:9px 12px;cursor:pointer;font-size:.9rem;border-bottom:1px solid #1c1c1c;white-space:nowrap;}
  .netopt:last-child{border-bottom:none;} .netopt.active{background:#1d2a31;color:#fff;}
  .netopt .hl{color:var(--accent);font-weight:700;}
  button.alt{background:var(--surface);color:var(--text);border:1px solid var(--line);font-weight:600;}
  .muted{color:var(--dim);font-size:.85rem;}
  .nethead{margin:6px 0 4px;font-size:1.05rem;} .nethead b{color:var(--accent);}
  .tmpl{font-size:.9rem;margin-bottom:4px;} .tmpl .bound{color:var(--ok);font-weight:700;} .tmpl .nb{color:#ffce85;font-weight:700;}
  .stamp{color:var(--dim);font-size:.82rem;margin-bottom:14px;}
  h2{font-size:.95rem;color:var(--accent);margin:22px 0 8px;}
  table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);border-radius:10px;overflow:hidden;font-size:.86rem;margin-bottom:8px;}
  th{text-align:left;color:var(--dim);font-size:.68rem;text-transform:uppercase;letter-spacing:.5px;padding:8px 11px;border-bottom:1px solid var(--line);}
  td{padding:8px 11px;border-bottom:1px solid #1f1f1f;} tr:last-child td{border-bottom:none;}
  td.port{color:var(--accent);font-weight:700;} .disc td{color:var(--off);} .ip{font-family:ui-monospace,Consolas,monospace;}
  .st-conn{color:var(--ok);} .st-disc{color:var(--off);} .av{color:var(--dim);}
  .hint{color:var(--accent);font-size:.78rem;} .nameok{color:var(--ok);font-weight:700;} .namewarn{color:#ff8b8b;font-weight:700;font-size:.78rem;}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:14px;}
  .panel textarea{width:100%;height:200px;background:#0d0d0d;color:var(--text);border:1px solid var(--line);border-radius:7px;padding:10px;font-family:ui-monospace,Consolas,monospace;font-size:.85rem;}
  .err{color:#ff8b8b;margin-top:10px;}
  .tabs{display:flex;gap:8px;margin:20px 0 0;}
  .tab{background:var(--surface);color:var(--dim);border:1px solid var(--line);border-bottom:none;border-radius:8px 8px 0 0;padding:8px 16px;font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit;}
  .tab.on{background:#1d2a31;color:var(--accent);}
  .hidden{display:none;}
  .wifi-ap{color:var(--dim);}
  .wifi-flag{display:inline-flex;align-items:center;gap:5px;background:#3a2a00;color:#ffce85;border:1px solid #ffce85;border-radius:5px;padding:1px 8px;font-weight:700;font-size:.82rem;white-space:nowrap;}
  .tab .wic{vertical-align:-2px;margin-right:5px;}
  .gate{position:fixed;inset:0;z-index:999;background:#0a0a0a;display:flex;align-items:center;justify-content:center;}
  .gate.hide{display:none;} .gbox{text-align:center;max-width:340px;width:90%;}
  .gbrand{font-size:2rem;font-weight:800;color:var(--accent);letter-spacing:.12em;} .gsub{color:#555;font-size:.8rem;margin:.3rem 0 1.6rem;}
  .gerr{color:#ff8b8b;font-size:.82rem;min-height:1.2em;margin-top:.6rem;}
  @media print{
    body{background:#fff;color:#000;} .nav,.bar,.gate,.tabs{display:none!important;} .hidden{display:block!important;}
    .wifi-flag{background:#fff3e0!important;color:#b35900!important;border-color:#d98a2b!important;}
    table{border-color:#ccc;} th{color:#555;} td{border-color:#eee;} td.port{color:#000;}
    .nethead b,h2,.tmpl .bound,.st-conn{color:#000;} *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  }
</style>
</head>
<body>
<div class="gate" id="gate">
  <div class="gbox">
    <div class="gbrand">MERAKI</div>
    <div class="gsub">network switch view &middot; private</div>
    <form id="gform" autocomplete="off">
      <input id="gpw" type="password" placeholder="password" autofocus style="width:100%;">
      <button type="submit" style="width:100%;margin-top:.7rem;">Enter</button>
      <div class="gerr" id="gerr"></div>
    </form>
  </div>
</div>

<div class="nav"><span><span class="be">Be</span> &middot; Meraki Switch View</span><span class="r">on demand</span></div>
<div class="wrap">
  <h1>Switch Port View</h1>
  <div class="bar">
    <div class="combo">
      <input id="netsearch" type="text" placeholder="type a network&hellip;" autocomplete="off">
      <div id="netlist" class="netlist"></div>
    </div>
    <button id="go">Pull</button>
    <label class="muted" style="display:flex;align-items:center;gap:6px;"><input type="checkbox" id="online" checked style="width:auto;"> Connected now only</label>
    <input id="ssid" type="text" value="mendo09" title="Wi-Fi SSID for the Wi-Fi tab" style="width:130px;">
    <button id="exh" class="alt" disabled>Export HTML</button>
    <button id="exp" class="alt" disabled>Export PDF</button>
    <button id="gear" class="alt" title="Device name map">&#9881;</button>
    <span class="muted" id="status"></span>
  </div>
  <div class="panel" id="settings" style="display:none;">
    <div class="muted" style="margin-bottom:6px;">Pre-configured device names &mdash; one per line: <code>Name &nbsp; IP</code>. Each pull hints/confirms/warns connected IPs against this.</div>
    <textarea id="namemap" spellcheck="false"></textarea>
    <div style="margin-top:8px;"><button id="savemap">Save</button> <span class="muted" id="savemsg"></span></div>
  </div>
  <div id="report"></div>
  <div class="err" id="err"></div>
</div>

<script>
const BRIDGE = "https://meraki-bridge-d5vc4tye3a-uw.a.run.app";
const PW_KEY = "meraki_pw_v1";
let PW = sessionStorage.getItem(PW_KEY) || "";
let LAST = "";
let TAB = "switch";
const WIFI="<svg class='wic' viewBox='0 0 24 24' width='13' height='13' fill='currentColor'><path d='M12 17.5a2 2 0 1 0 0 4 2 2 0 0 0 0-4zM12 3C7.6 3 3.6 4.8.8 7.7l2.1 2.1C5.2 7.5 8.4 6 12 6s6.8 1.5 9.1 3.8l2.1-2.1C20.4 4.8 16.4 3 12 3zm0 5c-2.9 0-5.5 1.2-7.4 3.1l2.1 2.1C8 11 9.9 10 12 10s4 1 5.3 2.2l2.1-2.1C17.5 9.2 14.9 8 12 8z'/></svg>";

function api(p){ return fetch(BRIDGE + p, { headers: { "Authorization": "Bearer " + PW } }); }
function esc(s){return String(s==null?"":s).replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]));}
function pacific(){
  try{ return new Intl.DateTimeFormat('en-CA',{timeZone:'America/Los_Angeles',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false,timeZoneName:'short'}).format(new Date()).replace(',',''); }
  catch(e){ return new Date().toISOString(); }
}

let NETS=[], FILTERED=[], ACTIVE=-1, SELECTED_ID="";
async function loadNetworks(){
  const r=await api("/meraki/networks"); if(r.status===401) throw new Error("unauthorized");
  const d=await r.json(); NETS=(d.networks||[]).slice().sort((a,b)=>a.name.localeCompare(b.name));
}
function scoreN(name,q){ name=name.toLowerCase(); q=q.toLowerCase(); if(!q) return 1; const i=name.indexOf(q); return i<0?-1:(i===0?2:1); }
function filterNets(q){ if(!q){ FILTERED=[]; ACTIVE=-1; drawList(q); return; } FILTERED=NETS.map(n=>({n,s:scoreN(n.name,q)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s||a.n.name.localeCompare(b.n.name)).slice(0,12).map(x=>x.n); ACTIVE=FILTERED.length?0:-1; drawList(q); }
function hlq(name,q){ if(!q) return esc(name); const i=name.toLowerCase().indexOf(q.toLowerCase()); if(i<0) return esc(name); return esc(name.slice(0,i))+"<span class='hl'>"+esc(name.slice(i,i+q.length))+"</span>"+esc(name.slice(i+q.length)); }
function drawList(q){ const el=document.getElementById("netlist"); if(!FILTERED.length){ el.classList.remove("open"); el.innerHTML=""; return; } el.innerHTML=FILTERED.map((n,i)=>"<div class='netopt"+(i===ACTIVE?" active":"")+"' data-i='"+i+"'>"+hlq(n.name,q)+"</div>").join(""); el.classList.add("open"); }
function pickNet(i){ if(i<0||i>=FILTERED.length) return; SELECTED_ID=FILTERED[i].id; document.getElementById("netsearch").value=FILTERED[i].name; document.getElementById("netlist").classList.remove("open"); }
function resolveNet(){ if(SELECTED_ID) return SELECTED_ID; filterNets(document.getElementById("netsearch").value.trim()); if(FILTERED.length){ pickNet(0); return SELECTED_ID; } return ""; }

// --- pre-configured IP -> expected device name map (gear settings) ---
const MAP_KEY="meraki_namemap_v1";
const DEFAULT_MAP=["Bread Start\t10.90.100.50","Bread Finish\t10.90.100.58","Salad Start\t10.90.100.51",
"Salad Finish\t10.90.100.59","Expo\t10.90.100.52","Digital Expo\t10.90.100.53","HerdServe\t10.90.100.55",
"Injest\t10.90.100.101","Bread Printer\t10.90.100.70","Salad Printer\t10.90.100.71",
"Expo Printer\t10.90.100.72","Digital Expo Printer\t10.90.100.90"].join("\n");
function mapText(){ return localStorage.getItem(MAP_KEY) || DEFAULT_MAP; }
function parseMap(t){ const m={}; (t||"").split("\n").forEach(l=>{ l=l.trim(); if(!l) return; const mm=l.match(/^(.*?)[\s=,]+(\d{1,3}(?:\.\d{1,3}){3})\s*$/); if(mm) m[mm[2]]=mm[1].trim(); }); return m; }
let NAMEMAP=parseMap(mapText());
function nameCheck(ip, actual, mac){
  const exp=NAMEMAP[ip]; if(!exp) return "";
  const a=(actual||"").trim();
  const unnamed = !a || a.toLowerCase()===(mac||"").toLowerCase();
  if(unnamed) return " <span class='hint'>&rarr; likely \""+esc(exp)+"\"</span>";
  if(a.toLowerCase()===exp.toLowerCase()) return " <span class='nameok'>&check;</span>";
  return " <span class='namewarn'>&#9888; should be \""+esc(exp)+"\"</span>";
}

let LASTDATA=null;
function lastSeenPac(s){ if(!s) return ""; try{ return new Intl.DateTimeFormat('en-CA',{timeZone:'America/Los_Angeles',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(s)); }catch(e){ return s; } }
function swOrder(n){ n=(n||"").toUpperCase(); if(n.indexOf("POS")>=0) return 0; if(n.indexOf("BOH")>=0) return 1; return 2; }

async function pull(){
  const net=resolveNet(), err=document.getElementById("err");
  document.getElementById("report").innerHTML=""; err.textContent="";
  if(!net){ err.textContent="pick a network"; return; }
  const ssid=(document.getElementById("ssid").value||"").trim();
  document.getElementById("status").textContent="pulling switch…";
  const r=await api("/meraki/portmap?network="+encodeURIComponent(net));
  if(!r.ok){ document.getElementById("status").textContent=""; err.textContent="error "+r.status; return; }
  const port=await r.json();
  let wifi=null;
  if(ssid){
    document.getElementById("status").textContent="pulling Wi-Fi…";
    try{ const rw=await api("/meraki/ssid?ssid="+encodeURIComponent(ssid)+"&network="+encodeURIComponent(net)); if(rw.ok) wifi=await rw.json(); }catch(e){}
  }
  document.getElementById("status").textContent="";
  LASTDATA={ d: port, wifi, ssid, stamp: pacific() };
  render();
}

function render(){
  if(!LASTDATA) return;
  const d=LASTDATA.d, stamp=LASTDATA.stamp;
  const onlineOnly=document.getElementById("online").checked;
  let h="";
  h+="<div class='nethead'>Network: <b>"+esc(d.name||"")+"</b></div>";
  if(d.boundTemplate){ h+="<div class='tmpl'>Config template: <span class='bound'>"+esc(d.boundTemplate.name||d.boundTemplate.id)+"</span></div>"; }
  else { h+="<div class='tmpl'>Config template: <span class='nb'>NOT BOUND</span></div>"; }
  h+="<div class='stamp'>Pulled "+esc(stamp)+(onlineOnly?" &middot; connected-now only":" &middot; seen in last 24h")+"</div>";

  // --- Konductor rollout completeness: every mapped IP present + live (switch OR Wi-Fi) ---
  const wifi=LASTDATA.wifi, ssid=LASTDATA.ssid||"";
  const seen={};
  function portTag(swName){ const n=(swName||"").toUpperCase(); if(n.indexOf("POS")>=0) return "POS"; if(n.indexOf("BOH")>=0) return "BOH"; return (swName||"SW").trim(); }
  function noteSeen(ip,on,where,isWifi){ if(!ip) return; const s=seen[ip]||(seen[ip]={online:false,wheres:[]}); if(on) s.online=true; if(where && !s.wheres.some(w=>w.label===where)) s.wheres.push({label:where,wifi:!!isWifi}); }
  (d.switches||[]).forEach(sw=>(sw.ports||[]).forEach(p=>(p.clients||[]).forEach(c=>{
    noteSeen(c.ip,(c.status||"").toLowerCase()==="online",portTag(sw.name)+"-"+p.port,false);
  })));
  ((wifi&&wifi.clients)||[]).forEach(c=>{ noteSeen(c.ip,(c.status||"").toLowerCase()==="online",c.ssid||ssid,true); });

  const mapped=Object.keys(NAMEMAP);
  if(mapped.length){
    let live=0, rows="";
    mapped.forEach(ip=>{
      const nm=NAMEMAP[ip], s=seen[ip]; let st,cls;
      if(!s){ st="MISSING"; cls="namewarn"; }
      else if(s.online){ st="LIVE"; cls="nameok"; live++; }
      else { st="found, not live"; cls="hint"; }
      const where = s && s.wheres.length
        ? s.wheres.map(w=> w.wifi ? "<span class='wifi-flag'>"+WIFI+esc(w.label)+"</span>" : "<span class='port'>"+esc(w.label)+"</span>").join(" ")
        : "<span class='av'>&mdash;</span>";
      rows+="<tr><td>"+esc(nm)+"</td><td class='ip'>"+esc(ip)+"</td><td>"+where+"</td><td class='"+cls+"'>"+st+"</td></tr>";
    });
    const total=mapped.length, solid=(live===total);
    h+="<h2>Konductor Rollout &mdash; "+live+"/"+total+" live &middot; "+(solid?"<span class='nameok'>SOLID</span>":"<span class='namewarn'>NOT SOLID</span>")+"</h2>";
    h+="<table><thead><tr><th>Konductor device</th><th>IP</th><th>Port / SSID</th><th>Status</th></tr></thead><tbody>"+rows+"</tbody></table>";
  }

  // --- tabs: Switch Ports | Wi-Fi ---
  let wc=((wifi&&wifi.clients)||[]).slice();
  const wcTotal=wc.length;
  if(onlineOnly) wc=wc.filter(c=>(c.status||"").toLowerCase()==="online");
  wc.sort((a,b)=>(((a.status||"").toLowerCase()==="online"?0:1)-((b.status||"").toLowerCase()==="online"?0:1))||(a.ip||"").localeCompare(b.ip||"",undefined,{numeric:true}));
  h+="<div class='tabs'>"+
     "<button class='tab"+(TAB==="switch"?" on":"")+"' data-tab='switch'>Switch Ports</button>"+
     "<button class='tab"+(TAB==="wifi"?" on":"")+"' data-tab='wifi'>"+WIFI+(ssid?esc(ssid):"Wi-Fi")+" &middot; "+wcTotal+"</button>"+
     "</div>";

  // --- Switch pane ---
  h+="<div id='pane-switch' class='"+(TAB==="switch"?"":"hidden")+"'>";
  const dev=d.devices||[];
  if(dev.length){
    h+="<h2>Meraki Devices ("+dev.length+")</h2><table><thead><tr><th>Name</th><th>Model</th><th>Serial</th><th>MAC</th></tr></thead><tbody>";
    dev.forEach(x=>{ h+="<tr><td>"+esc(x.name||"(no name)")+"</td><td>"+esc(x.model)+"</td><td>"+esc(x.serial)+"</td><td class='ip'>"+esc(x.mac)+"</td></tr>"; });
    h+="</tbody></table>";
  }
  (d.switches||[]).slice().sort((a,b)=>swOrder(a.name)-swOrder(b.name)||(a.name||"").localeCompare(b.name)).forEach(sw=>{
    h+="<h2>Switch: "+esc(sw.name||sw.serial)+"</h2>";
    h+="<table><thead><tr><th>Port</th><th>Status</th><th>VLAN</th><th>Allowed VLANs</th><th>Description</th><th>IP address</th><th>MAC address</th><th>Last seen (PT)</th></tr></thead><tbody>";
    const ports=(sw.ports||[]).slice().sort((a,b)=>parseInt(a.port,10)-parseInt(b.port,10));
    ports.forEach(p=>{
      const conn=(p.status||"").toLowerCase()==="connected";
      const allClients=(p.clients||[]);
      let cs=allClients;
      if(onlineOnly) cs=cs.filter(c=>(c.status||"").toLowerCase()==="online");
      let desc=cs.map(c=>esc(c.name||"")).join("<br>");
      // Connected port on the POS VLAN (100) with no client -> almost always a Toast POS receipt printer.
      if(conn && String(p.vlan)==="100" && allClients.length===0) desc="<span class='hint'>likely Toast POS Receipt Printer</span>";
      const ips=cs.map(c=>esc(c.ip||"")+nameCheck(c.ip||"", c.name, c.mac)).join("<br>");
      const macs=cs.map(c=>esc(c.mac||"")).join("<br>");
      const ls=cs.map(c=>esc(lastSeenPac(c.lastSeen))).join("<br>");
      h+="<tr class='"+(conn?"":"disc")+"'><td class='port'>"+esc(p.port)+
        "</td><td class='"+(conn?"st-conn":"st-disc")+"'>"+esc(p.status||"")+"</td><td>"+esc(p.vlan)+
        "</td><td class='av'>"+esc(p.allowedVlans||"")+"</td><td>"+desc+"</td><td class='ip'>"+ips+"</td><td class='ip'>"+macs+"</td><td class='av'>"+ls+"</td></tr>";
    });
    h+="</tbody></table>";
  });
  h+="</div>";

  // --- Wi-Fi pane ---
  h+="<div id='pane-wifi' class='"+(TAB==="wifi"?"":"hidden")+"'>";
  h+="<h2>Wi-Fi clients"+(ssid?" on "+esc(ssid):"")+" ("+wc.length+(onlineOnly?" online":"")+")</h2>";
  if(!wifi){ h+="<div class='muted'>No Wi-Fi data &mdash; set an SSID and pull.</div>"; }
  else if(!wc.length){ h+="<div class='muted'>No "+(onlineOnly?"online ":"")+"clients on "+esc(ssid)+" in this network.</div>"; }
  else {
    h+="<table><thead><tr><th>Description</th><th>IP address</th><th>MAC address</th><th>VLAN</th><th>SSID</th><th>AP</th><th>Device</th><th>Status</th><th>Last seen (PT)</th></tr></thead><tbody>";
    wc.forEach(c=>{
      const on=(c.status||"").toLowerCase()==="online";
      h+="<tr class='"+(on?"":"disc")+"'><td>"+esc(c.name||"")+nameCheck(c.ip||"",c.name,c.mac)+"</td>"+
        "<td class='ip'>"+esc(c.ip||"")+"</td><td class='ip'>"+esc(c.mac||"")+"</td><td>"+esc(c.vlan||"")+"</td>"+
        "<td><span class='wifi-flag'>"+WIFI+esc(c.ssid||ssid)+"</span></td>"+
        "<td class='wifi-ap'>"+esc(c.ap||"")+"</td><td class='av'>"+esc([c.manufacturer,c.os].filter(Boolean).join(" / "))+"</td>"+
        "<td class='"+(on?"st-conn":"st-disc")+"'>"+esc(c.status||"")+"</td><td class='av'>"+esc(lastSeenPac(c.lastSeen))+"</td></tr>";
    });
    h+="</tbody></table>";
  }
  h+="</div>";

  document.getElementById("report").innerHTML=h; LAST=h;
  document.getElementById("exh").disabled=false; document.getElementById("exp").disabled=false;
}

const EXPORT_CSS="@page{margin:12mm;size:landscape}body{font-family:Arial,Helvetica,sans-serif;margin:0;color:#111;font-size:11px}h2{color:#0d6e8c;font-size:14px;margin:16px 0 5px;border-bottom:1px solid #ccc;padding-bottom:3px}.nethead{font-size:18px;font-weight:bold;margin-bottom:2px}.nethead b{color:#0d6e8c}.tmpl{margin-bottom:2px}.tmpl .bound{color:#1f7a4d;font-weight:bold}.tmpl .nb{color:#c0392b;font-weight:bold}.stamp{color:#666;font-size:10px;margin-bottom:10px}table{width:100%;border-collapse:collapse;font-size:10.5px;margin-bottom:10px}th{text-align:left;background:#eef1f4;padding:5px 8px;border:1px solid #c9d0d8;font-size:9.5px;text-transform:uppercase;color:#555}td{padding:5px 8px;border:1px solid #dfe4e9;vertical-align:top}td.port{font-weight:bold;color:#0d6e8c}.disc td{color:#9aa0a6}.st-conn{color:#1f7a4d;font-weight:bold}.st-disc{color:#9aa0a6}.ip{font-family:Consolas,monospace}.hint{color:#0d6e8c}.nameok{color:#1f7a4d;font-weight:bold}.namewarn{color:#c0392b;font-weight:bold}.av{color:#777}thead{display:table-header-group}tr{break-inside:avoid}.tabs{display:none}.hidden{display:block!important}.wifi-ap{color:#666}.wifi-flag{display:inline-flex;align-items:center;gap:4px;background:#fff3e0;color:#b35900;border:1px solid #d98a2b;border-radius:5px;padding:0 6px;font-weight:bold}";
function exportDoc(){ return "<!DOCTYPE html><html><head><meta charset='utf-8'><title>Meraki Switch View</title><style>"+EXPORT_CSS+"</style></head><body>"+LAST+"</body></html>"; }
function exportHtml(){
  const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([exportDoc()],{type:"text/html"}));
  a.download="meraki-switch-view-"+pacific().replace(/[: ]/g,"-")+".html"; a.click();
}
function exportPdf(){
  if(!LAST){ return; }
  const f=document.createElement("iframe");
  f.style.cssText="position:fixed;right:0;bottom:0;width:0;height:0;border:0;";
  document.body.appendChild(f);
  const doc=f.contentWindow.document; doc.open(); doc.write(exportDoc()); doc.close();
  setTimeout(()=>{ try{ f.contentWindow.focus(); f.contentWindow.print(); }catch(e){} setTimeout(()=>{ try{document.body.removeChild(f);}catch(e){} }, 3000); }, 450);
}

document.getElementById("gform").addEventListener("submit", async e=>{
  e.preventDefault(); PW=document.getElementById("gpw").value;
  try{ await loadNetworks(); sessionStorage.setItem(PW_KEY,PW); document.getElementById("gate").classList.add("hide"); document.getElementById("netsearch").focus(); }
  catch(_){ document.getElementById("gerr").textContent="wrong password"; PW=""; }
});
document.getElementById("go").addEventListener("click", pull);
document.getElementById("online").addEventListener("change", render);
document.getElementById("report").addEventListener("click", e=>{ const t=e.target.closest("[data-tab]"); if(t){ TAB=t.getAttribute("data-tab"); render(); } });
document.getElementById("exh").addEventListener("click", exportHtml);
document.getElementById("exp").addEventListener("click", exportPdf);
document.getElementById("gear").addEventListener("click", ()=>{ const s=document.getElementById("settings"); s.style.display = s.style.display==="none"?"block":"none"; });
document.getElementById("savemap").addEventListener("click", ()=>{ const v=document.getElementById("namemap").value; localStorage.setItem(MAP_KEY,v); NAMEMAP=parseMap(v); document.getElementById("savemsg").textContent="saved · "+Object.keys(NAMEMAP).length+" mappings"; render(); });
document.getElementById("namemap").value=mapText();

// --- network combobox (type-to-filter, Enter picks the top match) ---
const _inp=document.getElementById("netsearch");
_inp.addEventListener("input", ()=>{ SELECTED_ID=""; filterNets(_inp.value.trim()); });
_inp.addEventListener("focus", ()=>filterNets(_inp.value.trim()));
_inp.addEventListener("keydown", e=>{
  const el=document.getElementById("netlist"), q=_inp.value.trim();
  if(e.key==="ArrowDown"){ e.preventDefault(); if(ACTIVE<FILTERED.length-1){ACTIVE++; drawList(q);} }
  else if(e.key==="ArrowUp"){ e.preventDefault(); if(ACTIVE>0){ACTIVE--; drawList(q);} }
  else if(e.key==="Enter"){ e.preventDefault(); if(ACTIVE>=0){ pickNet(ACTIVE); pull(); } }
  else if(e.key==="Escape"){ el.classList.remove("open"); }
});
document.getElementById("netlist").addEventListener("mousedown", e=>{ const o=e.target.closest(".netopt"); if(o){ pickNet(parseInt(o.dataset.i,10)); _inp.focus(); } });
document.addEventListener("click", e=>{ if(!e.target.closest(".combo")) document.getElementById("netlist").classList.remove("open"); });

(async()=>{ if(PW){ try{ await loadNetworks(); document.getElementById("gate").classList.add("hide"); }catch(_){ sessionStorage.removeItem(PW_KEY); } } })();
</script>
</body>
</html>
