<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Zendesk AI</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#111; color:#e6e6e6; min-height:100vh;
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    display:flex; align-items:center; justify-content:center; line-height:1.6; }
  .card { max-width:560px; padding:40px 32px; text-align:center; }
  h1 { color:#6FC3DF; font-weight:300; font-size:34px; letter-spacing:1px; margin-bottom:8px; }
  .tag { color:#888; font-size:15px; margin-bottom:24px; }
  .bar { height:2px; width:64px; background:#6FC3DF; margin:0 auto 24px; }
  p { color:#bbb; font-size:15px; }
  .soon { color:#6FC3DF; font-size:13px; letter-spacing:2px; text-transform:uppercase; margin-top:28px; }
</style>
</head>
<body>
  <div class="card">
    <h1>Zendesk AI</h1>
    <div class="tag">Mendocino Farms</div>
    <div class="bar"></div>
    <p>Turning support conversations into a knowledge base — and a smarter help desk.</p>
    <div class="soon">In build</div>
  </div>
</body>
</html>
